          "@type": "Question",
          "name": "What is an ATS score and why does it matter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An ATS (Applicant Tracking System) score measures how well your resume matches a job description. Most companies use ATS software to filter resumes before a human reads them. A higher ATS score means your resume is more likely to pass the automated filter and reach a hiring manager."
          }
        },
        {
          "@type": "Question",
          "name": "Is Resumehub.store free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Resumehub.store is completely free. You can upload your resume, get an AI-powered ATS score, receive improvement suggestions, and download professional CV formats — all at no cost."
          }
        },
        {
          "@type": "Question",
          "name": "What file formats does Resumehub.store support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Resumehub.store accepts PDF, DOCX, DOC, and TXT files up to 5MB. You can download your improved resume as a PDF or Word (.docx) file in 5 professional formats."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI resume analysis work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Powered by Google Gemini AI, Resumehub.store extracts content from your resume, compares it against the job description, scores each section (skills, experience, education, formatting), and generates actionable suggestions to improve your match rate."
          }
        },
        {
          "@type": "Question",
          "name": "What CV formats can I download?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can download your resume in 5 premium formats: Classic ATS (Audric), Specialized Technical, Sidebar Left (Elite), Sidebar Right (Elite), and Modern 2-Page Professional — all available as PDF or DOCX."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Resumehub without a job description?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Use the 'Fast Format' mode to instantly reformat your resume into our professional CV suite without needing a job description. The 'JD Matching' mode gives you a full ATS analysis when you have a specific job posting."
          }
        }
      ]
    }
